name: CI (Linux)
# This runs the main Rust and acornlib checks on pull requests and master pushes.

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ci-linux-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Compute Cargo cache key
        id: cargo-cache-key
        shell: bash
        run: |
          # Ignore the local package version so release commits do not create new multi-GB caches.
          lock_hash=$(
            awk '
              previous == "name = \"acorn\"" && $0 ~ /^version = / {
                print "version = \"0.0.0\""
                previous = $0
                next
              }
              {
                print
                previous = $0
              }
            ' Cargo.lock | sha256sum | cut -d " " -f 1
          )
          echo "lock_hash=$lock_hash" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo Build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ steps.cargo-cache-key.outputs.lock_hash }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt

      - name: Check Formatting
        run: cargo fmt --check

      - name: Cargo Check
        run: cargo check

      - name: Run Tests
        run: cargo test

      - name: Validate acornlib
        run: cargo run --profile release --features validate -- --lib acornlib check --strict
